services:
  postgis:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    network_mode: bridge
    environment:
      POSTGRES_USER: mda
      POSTGRES_PASSWORD: ${MDA_PG_PASSWORD}
      POSTGRES_DB: mda
    ports:
      - "5434:5432"
    volumes:
      - mda_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mda -d mda"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    image: d4d-mda-dashboard
    restart: unless-stopped
    network_mode: host
    command: ["uvicorn", "mda.api.app:app", "--host", "0.0.0.0", "--port", "8123"]
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_MODEL: ${LLM_MODEL}
      MDA_PG_DSN: postgresql://mda:${MDA_PG_PASSWORD}@localhost:5434/mda

  collector:
    image: d4d-mda-dashboard
    restart: unless-stopped
    network_mode: host
    command: ["python", "-m", "mda.cli", "ais-stream", "--regions", "west_sea"]
    environment:
      AISSTREAM_API_KEY: ${AISSTREAM_API_KEY}
      MDA_PG_DSN: postgresql://mda:${MDA_PG_PASSWORD}@localhost:5434/mda
    depends_on:
      - dashboard

volumes:
  mda_pgdata:
    name: mda_pgdata
