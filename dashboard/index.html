<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SEASENTINEL — Maritime Intelligence Layer · D4D T4</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <span class="logo">SEA<b>SENTINEL</b></span>
      <span class="sub">Maritime Domain Awareness · Intelligence Layer</span>
    </div>
    <div class="spacer"></div>
    <div class="region-tog">
      <button data-r="west_sea" class="on">🇰🇷 서해 / NLL</button>
      <button data-r="baltic" class="baltic">🌍 발트해</button>
    </div>
    <button class="triage-tog on" id="triage-tog" title="확인 부하 Triage">⚡ TRIAGE</button>
    <div class="kpis">
      <div class="kpi cyan"><div class="v" id="k-track">0</div><div class="l">Tracked</div></div>
      <div class="kpi red"><div class="v" id="k-dark">0</div><div class="l">Dark(AIS off)</div></div>
      <div class="kpi red"><div class="v" id="k-mism">0</div><div class="l">Mismatch</div></div>
      <div class="kpi amber"><div class="v" id="k-alerts">0</div><div class="l">Alerts</div></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- LEFT: threat board -->
    <div class="col">
      <div class="col-hd"><span class="dot"></span> 확인 우선순위 · TRIAGE BOARD</div>
      <div class="col-body" id="alerts"></div>
    </div>

    <!-- CENTER: map -->
    <div class="col" style="border:none">
      <div class="mapwrap">
        <svg class="map"></svg>
        <div class="banner"><span class="bd"></span><span class="txt"></span></div>
        <div class="zoomctl">
          <button id="zin" title="확대">+</button>
          <button id="zout" title="축소">−</button>
          <button id="zreset" title="전체보기">⤢</button>
          <div class="zlvl" id="zoomlvl">1.0×</div>
        </div>
        <div class="maptag">
          <div><b id="regionName">서해</b></div>
          <div id="theatre" style="color:#4ad3c8"></div>
          <div id="meta-line" style="margin-top:4px;max-width:280px"></div>
          <button class="pipeline-btn" id="pipeline-btn">ⓘ 데이터 소스 · 모델 파이프라인</button>
        </div>
        <div class="legend">
          <div class="li"><span class="sw" style="background:#ff4d4f"></span> 명명 위협선박 / 다크선박</div>
          <div class="li"><span class="sw" style="background:#f5a623"></span> 위장 의심(민병대) / 구조물</div>
          <div class="li"><span class="sw" style="background:#7f93b5"></span> 상선(화물·유조)</div>
          <div class="li"><span class="sw" style="background:#6b7688"></span> 중국어선 &nbsp;<span class="sw" style="background:#3f7d5f"></span> 한국어선</div>
          <div class="li"><span class="sw" style="background:#38bdf8"></span> 아군 경비함 &nbsp;◇ SAR 미매칭</div>
          <div class="li" style="margin-top:5px;color:#5b7089">▸ 지도 객체를 클릭해 조치</div>
        </div>
        <div class="entcard" id="entcard"></div>
        <div class="toast" id="toast"></div>
        <div class="actionlog show" id="actionlog">
          <div class="log-hd">작전 로그 · <span id="log-count">0</span></div>
          <div class="log-body" id="log-body"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: tabs -->
    <div class="col right">
      <div class="tabs">
        <button data-tab="detail" class="on">킬체인</button>
        <button data-tab="graph">지식그래프</button>
        <button data-tab="osint">OSINT</button>
        <button data-tab="copilot">코파일럿</button>
      </div>
      <div class="tabpane on" id="pane-detail"></div>
      <div class="tabpane" id="pane-graph"></div>
      <div class="tabpane" id="pane-osint"></div>
      <div class="tabpane" id="pane-copilot">
        <div class="sec-t">지휘결심 지원 · NL QUERY <span style="float:right;font-weight:400">모델 <select id="cp-model" style="background:#0e1626;color:#cfe0f5;border:1px solid #24344b;border-radius:4px;font-family:var(--mono);font-size:11px;padding:2px 4px"></select></span></div>
        <div class="cp-input"><input id="cp-q" placeholder="자연어로 질의…" /><button id="cp-send">질의</button></div>
        <div class="cp-presets" id="cp-presets"></div>
        <div id="cp-out"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM: time -->
  <div class="timebar">
    <button class="play" id="play">▶</button>
    <button class="speedbtn" id="speed" title="재생 배속">1×</button>
    <div class="tlabel" id="tlabel">T+0h</div>
    <input class="scrub" id="scrub" type="range" min="0" max="72" step="1" value="27" />
    <div class="phasemarks">시나리오 창 72h · 앵커 2026-06-24 연평도</div>
  </div>
</div>
<div class="modal" id="dossier"></div>
<script src="app.js"></script>
</body>
</html>
