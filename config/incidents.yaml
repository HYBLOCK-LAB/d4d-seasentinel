- event_id: yellow_sea_coast_guard_boat_sunk_2016
  name: Chinese fishing boat rams and sinks ROK Coast Guard speedboat off Socheongdo
  event_type: illegal_fishing
  event_date: 2016-10-07
  region_id: west_sea
  lat: 37.75
  lon: 124.73
  description: A 100-ton Chinese fishing boat intentionally rammed and sank a 4.5-ton Korea Coast Guard speedboat about 76 km southwest of Socheongdo during an illegal-fishing crackdown; Korea called it attempted murder and protested to Beijing.
  citations:
    - "https://www.rand.org/pubs/commentary/2016/11/south-korea-cracks-down-on-illegal-chinese-fishing.html"
- event_id: incheon_coast_guard_gunfire_chinese_boats_2016
  name: Korea Coast Guard opens machine-gun fire on Chinese fishing fleet off Incheon
  event_type: illegal_fishing
  event_date: 2016-11-01
  region_id: west_sea
  lat: 37.5
  lon: 124.9
  description: KCG vessels fired 95 rounds from deck-mounted M60 machine guns into the air to stop about 30 illegally fishing Chinese boats off Incheon after several tried to ram the KCG vessel; two boats seized.
  citations:
    - "https://koreatimes.co.kr/www/news/nation/2016/11/116_217327.html"
- event_id: lee_dae_jun_shooting_2020
  name: North Korean troops shoot and kill ROK fisheries official Lee Dae-jun near NLL
  event_type: nll_intrusion
  event_date: 2020-09-22
  region_id: west_sea
  lat: 37.6653
  lon: 125.6975
  description: ROK fisheries official Lee Dae-jun drifted across the NLL into North Korean waters near Yeonpyeong Island and was shot and killed by North Korean soldiers, his body burned; Kim Jong Un later apologized.
  citations:
    - "https://www.npr.org/2020/09/24/916430659/north-korean-troops-shoot-dead-south-korean-man-believed-attempting-to-defect"
- event_id: nll_illegal_fishing_surge_2022
  name: Surge in illegal Chinese fishing boat crossings of the NLL West Sea border
  event_type: illegal_fishing
  event_date: 2022-03-30
  region_id: west_sea
  lat: 37.8
  lon: 124.8
  description: KCG data showed unlicensed Chinese fishing boats near the NLL averaging 65/day in March 2022, up from 25/day in January and a fourfold rise versus March 2020, having peaked at 110/day in March 2021.
  citations:
    - "https://www.koreaherald.com/article/2826560"
- event_id: pmz_atlantic_amsterdam_platform_2022
  name: China installs Atlantic Amsterdam platform in Yellow Sea PMZ
  event_type: gray_zone
  event_date: 2022-10-01
  region_id: west_sea
  lat: 36.5
  lon: 123.7
  description: China installed a repurposed offshore platform (Atlantic Amsterdam) inside the ROK-China Provisional Measures Zone as a deep-water aquaculture management platform without consulting Seoul; AMTI assessed possible functions beyond aquaculture.
  vessels: [Atlantic Amsterdam]
  citations:
    - "https://amti.csis.org/chinese-platforms-in-the-yellow-seas-south-korea-china-pmz/"
- event_id: nk_patrol_boat_nll_crossing_2023
  name: North Korean patrol boat crosses NLL near Baengnyeong, ROK fires warning shots
  event_type: nll_intrusion
  event_date: 2023-04-15
  region_id: west_sea
  lat: 37.9598
  lon: 124.6763
  description: A North Korean patrol boat pursuing a Chinese fishing boat crossed the NLL near Baengnyeong; a ROK naval vessel fired about 10 warning shots and the boat retreated. A responding ROK craft collided with the Chinese boat in poor visibility.
  citations:
    - "https://www.aljazeera.com/news/2023/4/16/s-korea-fires-warning-shots-after-n-korean-boat-incursion"
