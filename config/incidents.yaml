  region_id: west_sea
  lat: 36.55
  lon: 123.75
  description: AIS tracking showed the Chinese aquaculture cage Shen Lan 2 towed from Qingdao and installed in the ROK-China PMZ, the second structure clustered around Atlantic Amsterdam; ROK vessels repeatedly approached to monitor.
